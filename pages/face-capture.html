<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Attendance – Face Registration</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="../css/shared.css"/>
</head>
<body>

<div class="form-screen fade-in">
  <div class="page-header">
    <a class="back-btn" href="student-dashboard.html"><i class="fa fa-arrow-left"></i></a>
    <div>
      <div class="h2">Face Registration</div>
      <div class="small">Take a selfie to enable attendance</div>
    </div>
  </div>

  <div class="photo-placeholder" id="fc-placeholder">
    <i class="fa fa-camera" style="font-size:48px;color:var(--border2)"></i>
    <div class="small" style="text-align:center">Take or upload a clear photo of your face</div>
  </div>
  <img id="fc-preview" class="photo-preview hidden" alt="face"/>

  <div class="btn-row" style="margin-top:12px">
    <label class="btn btn-secondary" style="cursor:pointer">
      <i class="fa fa-camera"></i> Camera
      <input type="file" accept="image/*" capture="user" style="display:none" onchange="handleFaceCapture(event)"/>
    </label>
    <label class="btn btn-secondary" style="cursor:pointer">
      <i class="fa fa-image"></i> Gallery
      <input type="file" accept="image/*" style="display:none" onchange="handleFaceCapture(event)"/>
    </label>
  </div>

  <div id="fc-err" class="error-text" style="display:none"></div>

  <div style="margin-top:24px">
    <button class="btn btn-primary" id="fc-btn" onclick="doFaceRegister()">Register Face</button>
  </div>
</div>

<script src="../js/shared.js"></script>
<script src="../js/face-capture.js"></script>
</body>
</html>
