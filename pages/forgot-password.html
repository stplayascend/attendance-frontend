<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Attendance – Forgot Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="../css/shared.css"/>
</head>
<body>

<div class="form-screen fade-in">
  <div class="page-header">
    <a class="back-btn" href="login.html"><i class="fa fa-arrow-left"></i></a>
    <div>
      <div class="h2" id="fp-title">Forgot Password</div>
      <div class="small" id="fp-subtitle">Enter the email you registered with</div>
    </div>
  </div>

  <!-- Step 1 – Email -->
  <div id="fp-step1">
    <div class="input-group">
      <label class="input-label">Email</label>
      <input id="fp-email" class="input" type="email"/>
    </div>
    <div id="fp-s1-err" class="error-text" style="display:none"></div>
    <div style="margin-top:24px">
      <button class="btn btn-primary" id="fp-send-btn" onclick="fpSendOtp()">Send Code</button>
    </div>
  </div>

  <!-- Step 2 – OTP + New Password -->
  <div id="fp-step2" style="display:none">
    <div class="otp-hint">Code sent to <strong id="fp-email-show"></strong></div>
    <div class="input-group">
      <label class="input-label">6-digit code</label>
      <input id="fp-otp" class="input" type="number" placeholder="123456"/>
    </div>
    <div class="input-group">
      <label class="input-label">New Password</label>
      <input id="fp-newpw" class="input" type="password"/>
    </div>
    <div id="fp-s2-err" class="error-text" style="display:none"></div>
    <div style="margin-top:24px">
      <button class="btn btn-primary" id="fp-reset-btn" onclick="fpReset()">Reset Password</button>
    </div>
    <div style="text-align:center;margin-top:12px">
      <button class="link" style="color:var(--text2)" onclick="fpBack()">Didn't get it? Resend</button>
    </div>
  </div>
</div>

<script src="../js/shared.js"></script>
<script src="../js/forgot-password.js"></script>
</body>
</html>
