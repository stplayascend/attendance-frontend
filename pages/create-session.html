<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Attendance – Create Session</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="../css/create-session.css"/>
</head>
<body>

<div class="form-screen fade-in">
  <div class="page-header">
    <a class="back-btn" href="teacher-dashboard.html"><i class="fa fa-arrow-left"></i></a>
    <div>
      <div class="h2">Create Session</div>
      <div class="small">Set class details, then capture photos</div>
    </div>
  </div>

  <div class="input-group">
    <div class="input-label">Semester</div>
    <div class="pills" id="cs-sem-pills"></div>
  </div>
  <div class="input-group">
    <div class="input-label">Division</div>
    <div class="pills" id="cs-div-pills"></div>
  </div>
  <div class="input-group">
    <div class="input-label">Course / Lecture</div>
    <div id="cs-courses-area"></div>
  </div>

  <div style="display:flex;gap:12px">
    <div class="input-group" style="flex:1">
      <label class="input-label">Time From</label>
      <input id="cs-from" class="input" placeholder="HH:MM" value="10:00"/>
    </div>
    <div class="input-group" style="flex:1">
      <label class="input-label">Time To</label>
      <input id="cs-to" class="input" placeholder="HH:MM" value="11:00"/>
    </div>
  </div>

  <div id="cs-err" class="error-text" style="display:none"></div>

  <div style="margin-top:24px">
    <button class="btn btn-primary" id="cs-btn" onclick="doCreateSession()">Create &amp; Continue</button>
  </div>
</div>

<script src="../js/shared.js"></script>
<script src="../js/create-session.js"></script>
</body>
</html>
