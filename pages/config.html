<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Attendance – Setup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="../css/shared.css"/>
</head>
<body>

<div class="form-screen fade-in">
  <div style="margin-top:32px">
    <div class="h2">Setup Backend URL</div>
    <div class="body-muted" style="margin-top:6px">
      Enter the IP and port of your hosted backend server.
    </div>
  </div>

  <div class="input-group">
    <label class="input-label">Backend URL</label>
    <input id="cfg-url" class="input" placeholder="http://192.168.1.50:8000" value=""/>
  </div>
  <div class="small" style="margin-top:8px;color:var(--text2)">
    e.g. http://192.168.1.100:8000 (no trailing slash)
  </div>

  <div style="margin-top:24px">
    <button class="btn btn-primary" onclick="saveConfig()">Save &amp; Continue</button>
  </div>
</div>

<script src="../js/shared.js"></script>
<script>
  // Pre-fill if already set
  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('backend_url') || window.BACKEND_URL || '';
    document.getElementById('cfg-url').value = saved;
  });

  function saveConfig() {
    const val = document.getElementById('cfg-url').value.trim().replace(/\/$/, '');
    if (!val) { alert('Please enter a URL'); return; }
    window.BACKEND_URL = val;
    localStorage.setItem('backend_url', val);
    window.location.href = 'login.html';
  }
</script>
</body>
</html>
