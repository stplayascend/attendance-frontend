<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Attendance – Change Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="../css/change-password.css"/>
</head>
<body>

<div class="form-screen fade-in">
  <div class="page-header">
    <button class="back-btn" id="cp-back-btn" onclick="cpBack()"><i class="fa fa-arrow-left"></i></button>
    <div>
      <div class="h2" id="cp-title">Change Password</div>
      <div class="small" id="cp-subtitle">Update your account password</div>
    </div>
  </div>

  <div id="cp-current-group" class="input-group">
    <label class="input-label">Current Password</label>
    <input id="cp-current" class="input" type="password"/>
  </div>
  <div class="input-group">
    <label class="input-label">New Password</label>
    <input id="cp-new" class="input" type="password"/>
  </div>
  <div class="input-group">
    <label class="input-label">Confirm New Password</label>
    <input id="cp-confirm" class="input" type="password"/>
  </div>

  <div id="cp-err" class="error-text" style="display:none"></div>

  <div style="margin-top:24px">
    <button class="btn btn-primary" id="cp-btn" onclick="doChangePassword()">Update Password</button>
  </div>
</div>

<script src="../js/shared.js"></script>
<script src="../js/change-password.js"></script>
</body>
</html>
